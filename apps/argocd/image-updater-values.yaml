# ---- existing sections you already have ----
serviceAccount:
  create: false
  name: argocd-image-updater

config:
  registries:
    - name: ECR
      api_url: https://445529239852.dkr.ecr.ap-east-1.amazonaws.com
      prefix: 445529239852.dkr.ecr.ap-east-1.amazonaws.com
      ping: yes
      credentials: ext:/scripts/ecr-login.sh
      credsexpire: 11h

authScripts:
  enabled: true
  scripts:
    ecr-login.sh: |
      #!/bin/sh
      # Redirect AWS CLI scratch files to a writable path (root fs is read-only)
      export HOME=/tmp
      # ECR token decodes to "AWS:<password>" = the <user>:<pass> format expected;
      # tr -d strips trailing newline so output is strictly single-line.
      aws ecr get-authorization-token \
        --region ap-east-1 --output text \
        --query 'authorizationData[0].authorizationToken' \
      | base64 -d | tr -d '\n'

# ---- ADD these three top-level sections ----

# Give AWS CLI a writable scratch dir; keep readOnlyRootFilesystem: true intact
extraEnv:
  - name: HOME
    value: /tmp
