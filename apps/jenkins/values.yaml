# Jenkins for EKS - jif-lab
# Adapted from lab cluster values.yaml, replacing Harbor with ECR
# Plugin versions locked after UI-driven upgrade (source of truth: helm)

controller:
  containerSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false

  componentName: "jenkins-controller"
  image:
    registry: "docker.io"
    repository: "jenkins/jenkins"
    tag: "2.555.2-lts"
    tagLabel: jdk21
    pullPolicy: "IfNotPresent"

  replicas: 1

  disableRememberMe: false
  numExecutors: 0
  executorMode: "NORMAL"

  admin:
    username: "admin"
    userKey: jenkins-admin-user
    passwordKey: jenkins-admin-password
    createSecret: true
    existingSecret: ""

  jenkinsHome: "/var/jenkins_home"
  jenkinsRef: "/usr/share/jenkins/ref"
  jenkinsWar: "/usr/share/jenkins/jenkins.war"

  resources:
    requests:
      cpu: "250m"
      memory: "1Gi"
    limits:
      cpu: "1500m"
      memory: "2Gi"

  enableServiceLinks: false

  javaOpts: "-XX:MaxRAMPercentage=70.0 -Dhudson.slaves.NodeProvisioner.initialDelay=0 -Dhudson.slaves.NodeProvisioner.MARGIN=50 -Dhudson.slaves.NodeProvisioner.MARGIN0=0.85"

  jenkinsUrl: "https://jenkins.aws.ololol.lol/"
  
  ingress:                                           # 加:整段
    enabled: true
    apiVersion: "networking.k8s.io/v1"
    ingressClassName: alb
    hostName: jenkins.aws.ololol.lol
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/group.name: jif-lab
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: '443'
      alb.ingress.kubernetes.io/healthcheck-path: /login

  usePodSecurityContext: true
  runAsUser: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

  serviceType: ClusterIP
  servicePort: 8080
  targetPort: 8080

  # Locked plugin versions (exported from running instance after UI upgrade)
  installPlugins:
