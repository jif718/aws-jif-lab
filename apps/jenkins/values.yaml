  installLatestPlugins: false
  installLatestSpecifiedPlugins: false
  additionalPlugins: []
  initializeOnce: true
  overwritePlugins: false
  overwritePluginsFromImage: false

  projectNamingStrategy: standard
  enableRawHtmlMarkupFormatter: false

  JCasC:
    defaultConfig: false
    overwriteConfiguration: true
    configScripts:
      # Master node settings - force 0 executors on built-in node
      master-config: |
        jenkins:
          numExecutors: 0
          mode: NORMAL
          labelString: ""

      credentials: |
        credentials:
          system:
            domainCredentials:
              - credentials:
                  - usernamePassword:
                      scope: GLOBAL
                      id: "github-token"
                      username: "${jenkins-credentials-GITHUB_USERNAME}"
                      password: "${jenkins-credentials-GITHUB_PAT}"
                      description: "GitHub Personal Access Token"

      kubernetes-cloud-and-agents: |
        jenkins:
          clouds:
            - kubernetes:
                name: "kubernetes"
                webSocket: true
                serverUrl: "https://kubernetes.default"
                namespace: "jenkins"
                jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080/"
                containerCapStr: "10"
                maxRequestsPerHostStr: "32"
                retentionTimeout: 5
                waitForPodSec: 600
                connectTimeout: 100
                readTimeout: 15
                podLabels:
                  - key: "jenkins/jenkins-jenkins-agent"
                    value: "true"
                templates:
                  - name: "python-agent"
                    namespace: "jenkins"
                    label: "python"
                    nodeUsageMode: "NORMAL"
                    podRetention: "never"
                    serviceAccount: "jenkins-agent"
                    idleMinutes: 0
                    instanceCap: 10
                    slaveConnectTimeoutStr: "100"
                    yamlMergeStrategy: "override"
                    showRawYaml: true
                    workspaceVolume:
                      emptyDirWorkspaceVolume:
                        memory: false
                    nodeSelector: "kubernetes.io/os=linux"
                    containers:
                      - name: "jnlp"
                        image: "jenkins/inbound-agent:latest"
                        alwaysPullImage: false
                        workingDir: "/home/jenkins/agent"
                        ttyEnabled: true
                        resourceRequestCpu: "100m"
                        resourceRequestMemory: "256Mi"
                        resourceLimitCpu: "300m"
                        resourceLimitMemory: "512Mi"
                      - name: "python"
                        image: "python:3.12-slim"
                        alwaysPullImage: false
                        workingDir: "/home/jenkins/agent"
                        command: "sleep"
                        args: "infinity"
                        ttyEnabled: true
                        resourceRequestCpu: "200m"
                        resourceRequestMemory: "256Mi"
                        resourceLimitCpu: "500m"
                        resourceLimitMemory: "768Mi"

                  - name: "kaniko-agent"
                    namespace: "jenkins"
                    label: "kaniko"
                    nodeUsageMode: "NORMAL"
                    podRetention: "never"
                    serviceAccount: "jenkins-agent"
                    idleMinutes: 0
                    instanceCap: 5
                    slaveConnectTimeoutStr: "100"
                    yamlMergeStrategy: "override"
                    showRawYaml: true
                    workspaceVolume:
                      emptyDirWorkspaceVolume:
                        memory: false
                    nodeSelector: "kubernetes.io/os=linux"
                    containers:
                      - name: "jnlp"
                        image: "jenkins/inbound-agent:latest"
                        alwaysPullImage: false
                        workingDir: "/home/jenkins/agent"
                        ttyEnabled: true
                        resourceRequestCpu: "100m"
                        resourceRequestMemory: "256Mi"
                        resourceLimitCpu: "500m"
                        resourceLimitMemory: "768Mi"
                      - name: "kaniko"
                        image: "445529239852.dkr.ecr.ap-east-1.amazonaws.com/library/kaniko-executor:v1.24.0-debug"
                        alwaysPullImage: false
                        workingDir: "/workspace"
                        command: "sleep"
                        args: "99d"
                        ttyEnabled: true
                        resourceRequestCpu: "250m"
                        resourceRequestMemory: "512Mi"
                        resourceLimitCpu: "1500m"
                        resourceLimitMemory: "1.5Gi"

        unclassified:
          location:
            url: "https://jenkins.aws.ololol.lol/"

    security:
      apiToken:
        creationOfLegacyTokenEnabled: false
        tokenGenerationOnCreationEnabled: false
        usageStatisticsEnabled: true

    securityRealm: |-
      local:
        allowsSignup: false
        enableCaptcha: false
        users:
        - id: "${chart-admin-username}"
          name: "Jenkins Admin"
          password: "${chart-admin-password}"

    authorizationStrategy: |-
      loggedInUsersCanDoAnything:
        allowAnonymousRead: false

    configMapAnnotations: {}

  customInitContainers: []

  probes:
    startupProbe:
      httpGet:
        path: '{{ default "" .Values.controller.jenkinsUriPrefix }}/login'
        port: http
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30
    livenessProbe:
      failureThreshold: 5
      httpGet:
        path: '{{ default "" .Values.controller.jenkinsUriPrefix }}/login'
        port: http
      periodSeconds: 10
      timeoutSeconds: 5
    readinessProbe:
      failureThreshold: 3
      httpGet:
        path: '{{ default "" .Values.controller.jenkinsUriPrefix }}/login'
        port: http
      periodSeconds: 10
      timeoutSeconds: 5

  agentListenerEnabled: false

  serviceAccount:
    create: false
    name: jenkins

persistence:
  enabled: true
  storageClass: "gp3"
  accessMode: "ReadWriteOnce"
  size: "10Gi"

rbac:
  create: true
  readSecrets: false
  useOpenShiftNonRootSCC: false

serviceAccount:
  create: false
  name: jenkins
  automountServiceAccountToken: true

serviceAccountAgent:
  create: false
  name: jenkins-agent

agent:
  enabled: false

networkPolicy:
  enabled: false

checkDeprecation: true
