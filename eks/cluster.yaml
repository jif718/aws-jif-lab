apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: jif-lab
  region: ap-east-1
  version: "1.34"
  tags:
    Owner: jif
    Env: lab
    Project: devops-learning

# 启用 OIDC Provider，后面 IRSA (IAM Role for ServiceAccount) 要用
iam:
  withOIDC: true

# VPC 配置：自动创建，跨 2 AZ
vpc:
  cidr: "10.42.0.0/16"
  nat:
    gateway: Single   # 单 NAT，省钱（高可用要 HighlyAvailable，多花 $32/月）
  clusterEndpoints:
    publicAccess: true    # 允许从公网访问 API Server (你本地 kubectl 要用)
    privateAccess: true   # 节点和 API Server 走内网通信

# 集群附加组件（托管 add-on，自动升级）
addons:
  - name: vpc-cni            # AWS 原生 CNI，替换你的 Calico
    version: latest
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest
  - name: aws-ebs-csi-driver  # EBS CSI 驱动，PVC 要用
    version: latest
    wellKnownPolicies:
      ebsCSIController: true

# Node Group 1: 通用 worker
managedNodeGroups:
  - name: workers-general
    instanceType: t4g.large
    amiFamily: AmazonLinux2023
    desiredCapacity: 2
    minSize: 2
    maxSize: 4
    volumeSize: 30           # 节点根盘 30G
    spot: true               # Spot 实例
    privateNetworking: true  # 节点放私有子网
    labels:
      role: general
    tags:
      NodeGroup: workers-general
    iam:
      withAddonPolicies:
        ebs: true
        cloudWatch: true
        autoScaler: true

  # Node Group 2: 预留给有状态服务
  - name: workers-stateful
    instanceType: t4g.large
    amiFamily: AmazonLinux2023
    desiredCapacity: 1
    minSize: 1
    maxSize: 2
    volumeSize: 30
    spot: true
    privateNetworking: true
    labels:
      role: stateful
    taints:
      - key: stateful
        value: "true"
        effect: NoSchedule
    tags:
      NodeGroup: workers-stateful
    iam:
      withAddonPolicies:
        ebs: true
        cloudWatch: true
        autoScaler: true

# CloudWatch 日志（默认全开会贵，按需开关键的几项）
cloudWatch:
  clusterLogging:
    enableTypes: ["audit", "authenticator"]
